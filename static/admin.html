<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self'; font-src 'self'; connect-src 'self'; form-action 'self'; manifest-src 'self'; base-uri 'self';">
    <title>Management Console</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/totp.css">
    <link rel="stylesheet" href="/css/admin.css">
    <script src="/library/oauth-client.js" defer></script>
    <script src="/js/totp.js" defer></script>
    <script src="/js/admin-core.js" defer></script>
    <script src="/js/admin-profile.js" defer></script>
    <script src="/js/admin-org.js" defer></script>
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <link rel="manifest" href="/favicon/site.webmanifest">
</head>
<body>
    <!-- Client Picker Overlay (shown on first visit) -->
    <div id="pickerOverlay">
        <div class="picker-card">
            <div id="pickerContent">
                <p>Loading...</p>
            </div>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="dashboard">
        <!-- Subtle header -->
        <div class="admin-toolbar">
            <div>
                <div>User ID: <span id="userInfo">...</span></div>
                <div>Connected via Client ID: <span id="clientInfo">...</span></div>
            </div>
            <button data-action="logout" class="btn-red logout-btn">Log Out</button>
        </div>

        <h1>Management Console</h1>

        <!-- Tab bar (hidden for non-admin users) -->
        <div id="tabBar">
            <button data-action="switch-tab" data-tab="profile"
                    id="tabProfile" class="admin-tab active">
                Your Profile
            </button>
            <button data-action="switch-tab" data-tab="admin"
                    id="tabAdmin" class="admin-tab">
                Organization Management
            </button>
        </div>

        <!-- Profile Section -->
        <div id="profileSection">
            <h2 id="profileHeading">Your Profile</h2>
            <div id="profileContent">
                <p>Loading your profile...</p>
            </div>

            <!-- EMAIL_SECTION_START -->
            <h3>Email Addresses</h3>
            <div id="emailsContent">
                <p>Loading emails...</p>
            </div>
            <!-- EMAIL_SECTION_END -->

            <h3>Security</h3>
            <div id="securityContent">
                <button data-action="show-change-password">Change Password</button>
                <button data-action="show-mfa-setup">Configure MFA</button>
            </div>

            <h3 id="oidcHeading">OpenID Connect</h3>
            <div>
                <button data-action="fetch-userinfo">Get UserInfo</button>
                <div id="userinfoResult" class="hidden"></div>
            </div>
        </div>

        <!-- Admin Section (shown only if org_admin) -->
        <div id="adminSection" class="hidden">
            <h2 id="adminHeading">Organization Management</h2>
            <p>Organizations where you are an administrator:</p>
            <div id="orgsContent">
                <p>Loading organizations...</p>
            </div>
            <p id="upLink" class="back-link hidden"></p>
        </div>
        <p id="homeLink" class="back-link"><a href="/">← Home</a></p>
    </div>
</body>
</html>
