<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self'; font-src 'self'; connect-src 'self'; form-action 'self'; manifest-src 'self'; base-uri 'self';">
    <title>Log In</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/totp.css">
    <link rel="stylesheet" href="/css/login.css">
    <script src="/js/totp.js" defer></script>
    <script src="/js/login.js" defer></script>
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <link rel="manifest" href="/favicon/site.webmanifest">
</head>
<body>
    <div class="page-container">
        <h1>Log In</h1>

        <form id="loginForm">
            <div class="form-field">
                <label for="id">ID</label>
                <input type="text" id="id" name="id" placeholder="Email or Username" required>
            </div>

            <div class="form-field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Secret" required>
            </div>

            <button type="submit" class="btn-blue">Log In</button>
        </form>

        <div id="message"></div>

        <!-- PASSWORD_RESET_LINK_START -->
        <p class="help-text">
            <a href="/request-password-reset">Request Password Reset</a>
        </p>
        <!-- PASSWORD_RESET_LINK_END -->

        <!-- PASSWORDLESS_LOGIN_LINK_START -->
        <p class="help-text">
            <a href="/request-passwordless-login" id="passwordlessLink">Request Temporary Access Link</a>
        </p>
        <!-- PASSWORDLESS_LOGIN_LINK_END -->

        <p class="back-link"><a href="/">← Home</a></p>
    </div>
</body>
</html>
