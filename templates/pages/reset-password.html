<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self'; font-src 'self'; connect-src 'self'; form-action 'self'; manifest-src 'self'; base-uri 'self';">
<title>Set New Password</title>
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/templates.css">
<script src="/js/templates.js" defer></script>
</head><body>
<div class="page-container">
<h1>Set New Password</h1>
<form method="POST" action="/reset-password" id="resetForm" data-min-length="{{MIN_LENGTH}}">
<input type="hidden" name="token" value="{{TOKEN}}">
<div class="form-field">
<label for="password">New Password</label>
<input type="password" id="password" name="password" autocomplete="new-password" required>
</div>
<div class="form-field">
<label for="confirm">Confirm Password</label>
<input type="password" id="confirm" autocomplete="new-password" required>
</div>
<button type="submit" class="btn-green">Set New Password</button>
</form>
<div id="error"></div>
</div>
</body></html>
