<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self'; font-src 'self'; connect-src 'self'; form-action 'self'; manifest-src 'self'; base-uri 'self';">
<title>Request Temporary Access Link</title>
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/templates.css">
<script src="/js/templates.js" defer></script>
</head><body>
<div class="page-container">
<h1>Request Temporary Access Link</h1>
<form id="plForm" data-endpoint="/request-passwordless-login" data-success-message="If that email belongs to a verified account<br>with passwordless login enabled,<br>a login link has been sent.<br><br>Check your inbox.">
<input type="hidden" id="returnTo" value="{{RETURN_TO}}">
<div class="form-field">
<label for="email">Email Address</label>
<input type="email" id="email" name="email" placeholder="you@example.com" required>
</div>
<button type="submit" class="btn-blue">Send Access Link</button>
</form>
<div id="message"></div>
<p class="back-link"><a href="/login">&larr; Log In</a></p>
</div>
</body></html>
