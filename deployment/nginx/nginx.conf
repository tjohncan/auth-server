user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml application/xml+rss text/javascript;

    server_tokens off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Content-Security-Policy "default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self'; font-src 'self'; connect-src 'self'; form-action 'self'; frame-ancestors 'self'; manifest-src 'self'; base-uri 'self';" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ---------------------------------------------------------------------------
    # WHOSE IP ARE WE LIMITING?
    #
    # Everything below keys on $binary_remote_addr — the address of whoever opened
    # the TCP connection to nginx. In the shipped topology that is the real client:
    # docker-compose publishes 80/443, so nginx IS the edge.
    #
    # Put ANYTHING in front of nginx (ALB, CloudFront, Cloudflare, another proxy) and
    # that stops being true. nginx then sees the proxy's address on every request, and:
    #
    #   * every user shares ONE rate-limit bucket — your real users start 503ing each
    #     other while an attacker hides in the crowd. This is worse than no limit.
    #   * X-Real-IP forwarded to the auth server becomes the proxy's address, so every
    #     source_ip in the audit tables is wrong.
    #
    # Fix both by having nginx recover the true client address — but ONLY from a proxy
    # you control. Trusting X-Forwarded-For from anywhere lets an attacker spoof a
    # fresh value per request and bypass every limit here, which is worse than useless.
    # Uncomment and set the ranges you actually own:
    #
    #   set_real_ip_from  10.0.0.0/8;      # e.g. your VPC / ALB subnet
    #   real_ip_header    X-Forwarded-For;
    #   real_ip_recursive on;
    # ---------------------------------------------------------------------------

    # Rate limiting
    #
    # auth_limit  — general traffic. Generous; this is DoS shaping, not auth defense.
    # login_limit — credential submission. Strict, because the server deliberately does
    #               no in-server login throttling (see "Deliberate Tradeoffs" in the
    #               root README): brute-force defense is the edge's job, and the edge
    #               has to actually do it. At the general 10r/s a single IP could try
    #               ~860,000 passwords per day; at 10r/m it gets ~14,400, and a burst
    #               of 10 still absorbs a human fat-fingering their password.
    #
    # Per-IP limiting does not stop a distributed/credential-stuffing attack — that is
    # what a WAF in front of nginx is for. This closes the single-IP hole.
    # revoke_limit — /revoke accepts public clients, whose client_id is not a secret, so
    #               it is reachable unauthenticated. That yields an attacker nothing
    #               (revocation needs the exact 256-bit token, and destroying a token you
    #               already hold is self-harm), but it is an unauthenticated *write* path
    #               and no-op UPDATEs are not free. Legitimate use is one or two calls per
    #               logout, so 30r/m is generous while capping the hammering.
    #
    # login_limit is keyed on METHOD, not just address. `location = /login` matches every
    # method at that URI, and GET /login is the login *page* — so a naive key would make
    # page views and password submissions share one 10r/m bucket. A NAT'd office at 9am,
    # or a mobile carrier's CGNAT pool with thousands of subscribers behind one IPv4,
    # would 503 on the page itself. The attacker, who sends only POSTs, would be untouched
    # by that. An empty limit_req key is not counted, so this charges POSTs only; GETs fall
    # through to auth_limit.
    map $request_method $login_post_key {
        POST    $binary_remote_addr;
        default "";
    }

    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
    limit_req_zone $login_post_key     zone=login_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=revoke_limit:10m rate=30r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    upstream auth_backend {
        server auth-server:8080;
    }

    include /etc/nginx/conf.d/*.conf;
}
